services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: /api/v1
      VITE_BACKEND_TARGET: http://backend:8000
    volumes:
      - .:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      backend:
        condition: service_healthy

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: text2sqllocal_qwen
      OLLAMA_KEEP_ALIVE: 10m
      DATABASE_URL: postgresql://{사용자명}:{비번}@host.docker.internal:5432/{db명}
      REDIS_URL: redis://redis:6379/0
      QUERY_LOG_PATH: /app/backend-log.txt
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/app
      - backend_pip_cache:/root/.cache/pip
    depends_on:
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "from urllib.request import urlopen; urlopen('http://127.0.0.1:8000/api/v1/health')"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 90s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  frontend_node_modules:
  backend_pip_cache:
  redis_data:
